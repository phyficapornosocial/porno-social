name: Build & Deploy to porno-social.com

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    # NOTE:
    # VS Code's local GitHub Actions diagnostics can warn that custom
    # secrets are "possibly invalid" even when workflow execution is correct.
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets['FIREBASE_SERVICE_ACCOUNT'] }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable

      - name: Check hardcoded domain literals
        run: bash scripts/check_domain_literals.sh

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release --base-href /

      - name: Deploy to Firebase Hosting (porno-social.com)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: pornosocial-c003d
          # After domain is connected, Firebase automatically serves
          # the deployed build at www.porno-social.com
