name: Build Flutter APK

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    # NOTE:
    # VS Code's local GitHub Actions diagnostics can warn that custom
    # secrets are "possibly invalid" even when the workflow executes fine.
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
      FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          cache: true

      - name: Check hardcoded domain literals
        run: bash scripts/check_domain_literals.sh

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-pub

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      # NOTE:
      # Use env.* in `if:` expressions instead of direct `secrets.*` checks.
      # Some local YAML validators in VS Code snapshots can flag false
      # "Unrecognized named-value: 'secrets'" errors, while env-based checks
      # stay lint-friendly and behave correctly in GitHub Actions.

      - name: Authenticate to Google Cloud (Firebase)
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        if: env.FIREBASE_SERVICE_ACCOUNT != '' && env.FIREBASE_APP_ID_ANDROID != ''
        run: npm install -g firebase-tools

      - name: Distribute APK to Firebase App Distribution
        if: env.FIREBASE_SERVICE_ACCOUNT != '' && env.FIREBASE_APP_ID_ANDROID != '' && env.FIREBASE_TESTER_GROUPS != ''
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "$FIREBASE_APP_ID_ANDROID" \
            --groups "$FIREBASE_TESTER_GROUPS" \
            --release-notes "GitHub Actions build ${GITHUB_SHA}"
